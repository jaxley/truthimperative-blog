licenselink = "https://opensource.org/licenses/MIT"
description = "Single-column blog theme inspired by the Eleventy Bliss template (truthimperative.axley.net). HSL color palette, light/dark mode, clean typography."
homepage    = ""
tags        = ["blog", "minimal", "dark-mode", "single-column", "responsive"]
